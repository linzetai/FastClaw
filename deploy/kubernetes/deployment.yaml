apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastclaw
  labels:
    app: fastclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastclaw
  template:
    metadata:
      labels:
        app: fastclaw
    spec:
      containers:
        - name: fastclaw
          image: fastclaw:latest
          ports:
            - containerPort: 18789
              name: http
          env:
            - name: FASTCLAW_PORT
              value: "18789"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/fastclaw
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: fastclaw-data
        - name: config
          configMap:
            name: fastclaw-config
---
apiVersion: v1
kind: Service
metadata:
  name: fastclaw
  labels:
    app: fastclaw
spec:
  type: ClusterIP
  ports:
    - port: 18789
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: fastclaw
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fastclaw-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
