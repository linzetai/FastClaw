# =============================================================================
# WIP: This K8s deployment requires the xiaolin server binary which is
# not yet implemented. Port (18789), volume mounts, and config paths
# need to be verified when the server mode is available.
#
# Current recommended usage: cargo tauri dev (desktop application)
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: xiaolin
  labels:
    app: xiaolin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xiaolin
  template:
    metadata:
      labels:
        app: xiaolin
    spec:
      containers:
        - name: xiaolin
          image: xiaolin:latest
          ports:
            - containerPort: 18789
              name: http
          env:
            - name: RUST_LOG
              value: "info"
            - name: XIAOLIN_STATE_DIR
              value: "/app"
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /app/config
          # TODO: Uncomment when server binary is available
          # livenessProbe:
          #   httpGet:
          #     path: /health
          #     port: http
          #   initialDelaySeconds: 5
          #   periodSeconds: 10
          # readinessProbe:
          #   httpGet:
          #     path: /ready
          #     port: http
          #   initialDelaySeconds: 3
          #   periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: xiaolin-data
        - name: config
          configMap:
            name: xiaolin-config
---
apiVersion: v1
kind: Service
metadata:
  name: xiaolin
  labels:
    app: xiaolin
spec:
  type: ClusterIP
  ports:
    - port: 18789
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: xiaolin
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: xiaolin-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
